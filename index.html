<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerreiro das Sombras Pro</title>
    <style>
        body { background: #000; color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .menu-btn { width: 220px; padding: 15px; margin: 10px; background: #111; border: 2px solid #f00; color: #fff; font-size: 18px; font-weight: bold; border-radius: 10px; }
        
        #game-area { width: 300px; height: 350px; background: #111; margin: 10px auto; position: relative; overflow: hidden; border: 2px solid #333; border-radius: 8px; }
        #player { width: 30px; height: 30px; position: absolute; bottom: 10px; left: 135px; border-radius: 4px; z-index: 5; background: red; transition: background 0.1s; }
        
        .bullet { background: yellow; width: 6px; height: 12px; position: absolute; z-index: 3; border-radius: 2px; }
        .z-bullet { width: 12px; height: 12px; background: orange; border-radius: 50%; position: absolute; z-index: 4; box-shadow: 0 0 8px orange; }
        .particle { position: absolute; width: 5px; height: 5px; z-index: 10; pointer-events: none; }

        #zombie-group { position: absolute; width: 60px; height: 60px; top: 10px; left: 120px; transition: left 0.3s ease-out; display: flex; flex-direction: column; align-items: center; z-index: 4; }
        #zombie { width: 30px; height: 30px; background: green; border-radius: 4px; transition: transform 0.2s, background 0.1s; }
        .z-warning { transform: scale(1.3); background: white !important; }

        #enemyHPContainer { width: 60px; height: 12px; background: #333; border: 1px solid #000; margin-top: 5px; border-radius: 3px; overflow: hidden; position: relative; }
        #enemyHPFill { height: 100%; background: #0f0; width: 100%; }
        #enemyHPText { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 8px; }

        #shield { position: absolute; width: 46px; height: 46px; border-radius: 50%; z-index: 2; display: none; border: 3px solid cyan; box-shadow: 0 0 10px cyan; pointer-events: none; }
        #pet { position: absolute; width: 15px; height: 15px; background: cyan; border-radius: 3px; display: none; box-shadow: 0 0 8px cyan; z-index: 4; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 300px; margin: 0 auto; font-size: 12px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 300px; margin: 10px auto; }
        
        button { padding: 15px 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer; position: relative; overflow: hidden; }
        #attack-button { grid-column: 1 / 3; background: #f44; }
        #focus-btn { background: #8e44ad; display: none; }
        
        #super-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 6px; background: #222; }
        #super-bar-fill { height: 100%; width: 0%; background: cyan; transition: width 0.2s; }
        
        #store { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #fff; padding: 15px; z-index: 2500; width: 280px; border-radius: 10px; box-shadow: 0 0 20px #fff; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1 style="color:red">GUERREIRO DAS SOMBRAS</h1>
        <button class="menu-btn" onclick="startGame(true)">NOVO JOGO (DO ZERO)</button>
        <button class="menu-btn" style="border-color:cyan" onclick="startGame(false)">CONTINUAR (SKILLS)</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color:red">GAME OVER</h1>
        <div id="death-stats" style="margin:15px"></div>
        <button class="menu-btn" onclick="backToLobby()">LOBBY</button>
    </div>

    <div id="game-area">
        <div id="player"></div>
        <div id="shield"></div>
        <div id="pet"></div>
        <div id="zombie-group">
            <div id="zombie"></div>
            <div id="enemyHPContainer"><div id="enemyHPFill"></div><div id="enemyHPText">0 HP</div></div>
        </div>
    </div>

    <div class="status-grid">
        <div>💰 Moedas: <span id="coins-display">0</span></div>
        <div>🌊 Onda: <span id="wave">1</span></div>
        <div>⚔️ Dano: <span id="damage">1</span></div>
        <div>❤️ Vida: <span id="vida">10</span></div>
    </div>

    <div class="controls">
        <button onclick="move('L')">⬅️</button>
        <button onclick="document.getElementById('store').style.display='block'">🛒 LOJA</button>
        <button onclick="move('R')">➡️</button>
        <button id="attack-button" onclick="shootBullet()">🔥 ATACAR</button>
        <button id="focus-btn" onclick="shootFocusBall()">🔮 FOCO</button>
        <button id="super-button" onclick="activateSuper()">
            ✨ SUPER
            <div id="super-bar-container"><div id="super-bar-fill"></div></div>
        </button>
        <button onclick="togglePause()" style="grid-column:1/4">⏸️ PAUSAR</button>
    </div>

    <div id="store">
        <h3 style="color:orange">LOJA</h3>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('dmg')">DANO +1 (10💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('hp')">VIDA +5 (15💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('shield')">ESCUDO (20💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyItem('focus')">HAB. FOCO (100💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyItem('pet')">PET (150💰)</button>
        <button style="width:100%;background:red;margin-top:10px" onclick="document.getElementById('store').style.display='none'">FECHAR</button>
    </div>

    <script>
        let petOwned = false, focusOwned = false, shieldSkill = false;
        let coins=0, damage=1, wave=1, playerHP=10, paused=true, shieldHP=0, zombieHP=5, zombieMaxHP=5, superCharge=0, playerHits=0;
        let canShoot = true;
        
        const player=document.getElementById("player"), zGroup=document.getElementById("zombie-group"), zombie=document.getElementById("zombie");
        const area=document.getElementById("game-area"), shield=document.getElementById("shield"), pet=document.getElementById("pet");

        function startGame(fullReset) {
            if(fullReset) { localStorage.clear(); petOwned=false; focusOwned=false; shieldSkill=false; }
            else { 
                petOwned = localStorage.getItem("gs_pet") === "true";
                focusOwned = localStorage.getItem("gs_focus") === "true";
                shieldSkill = localStorage.getItem("gs_shield_skill") === "true";
            }
            
            paused = false; coins = 0; wave = 1; playerHP = 10; damage = 1; superCharge = 0;
            shieldHP = (!fullReset && shieldSkill) ? 5 : 0;
            
            document.getElementById("main-menu").classList.add("hidden");
            resetEnemy(); 
            updateHUD();
            startLoops();
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<8; i++) {
                const p = document.createElement("div");
                p.className = "particle";
                p.style.background = color;
                p.style.left = x + "px";
                p.style.top = y + "px";
                area.appendChild(p);
                let vx = (Math.random() - 0.5) * 10;
                let vy = (Math.random() - 0.5) * 10;
                let m = setInterval(() => {
                    p.style.left = (parseFloat(p.style.left) + vx) + "px";
                    p.style.top = (parseFloat(p.style.top) + vy) + "px";
                    p.style.opacity = (p.style.opacity || 1) - 0.1;
                    if(p.style.opacity <= 0) { clearInterval(m); p.remove(); }
                }, 30);
            }
        }

        function updateHUD() {
            document.getElementById("vida").textContent = playerHP;
            document.getElementById("coins-display").textContent = coins;
            document.getElementById("wave").textContent = wave;
            document.getElementById("damage").textContent = damage;
            document.getElementById("focus-btn").style.display = focusOwned ? "block" : "none";
            pet.style.display = petOwned ? "block" : "none";
            
            const percent = (zombieHP / zombieMaxHP) * 100;
            document.getElementById("enemyHPFill").style.width = Math.max(0, percent) + "%";
            document.getElementById("enemyHPText").textContent = Math.ceil(Math.max(0, zombieHP)) + " HP";
            document.getElementById("super-bar-fill").style.width = superCharge + "%";
            
            if(shieldHP > 0) {
                shield.style.display = "block";
                shield.style.left = (player.offsetLeft - 8) + "px";
                shield.style.top = (player.offsetTop - 8) + "px";
            } else { shield.style.display = "none"; }
        }

        function resetEnemy() {
            zombieMaxHP = 5 + (wave * 2);
            zombieHP = zombieMaxHP;
            zGroup.style.left = "120px";
            playerHits = 0;
            updateHUD();
        }

        function shootBullet() {
            if(paused || !canShoot) return;
            canShoot = false;
            setTimeout(() => canShoot = true, 700);

            const b = document.createElement("div");
            b.className = "bullet";
            b.style.left = (player.offsetLeft + 12) + "px";
            b.style.top = (player.offsetTop - 10) + "px";
            area.appendChild(b);
            
            let m = setInterval(() => {
                if(paused) return;
                let pos = parseInt(b.style.top);
                let zL = zGroup.offsetLeft + 15;
                if(pos <= 45 && pos >= 10 && parseInt(b.style.left) + 6 >= zL && parseInt(b.style.left) <= zL + 30) {
                    clearInterval(m); b.remove();
                    zombieHP -= damage;
                    zombie.style.background = "white"; setTimeout(() => zombie.style.background = "green", 50);
                    playerHits++;
                    if(playerHits >= 3) { zGroup.style.left = (Math.random() * 240) + "px"; playerHits = 0; }
                    superCharge = Math.min(100, superCharge + 10);
                    if(zombieHP <= 0) { 
                        createExplosion(zGroup.offsetLeft + 30, 30, "green");
                        coins += 10; wave++; resetEnemy(); 
                    }
                    updateHUD();
                } else if(pos <= -20) { clearInterval(m); b.remove(); }
                else { b.style.top = (pos - 10) + "px"; }
            }, 25);
        }

        function shootFocusBall() {
            if(paused || !focusOwned || document.querySelector(".focus-ball")) return;
            const ball = document.createElement("div");
            ball.className = "focus-ball";
            ball.style.left = (player.offsetLeft + 7) + "px";
            ball.style.top = (player.offsetTop - 15) + "px";
            area.appendChild(ball);
            let m = setInterval(() => {
                if(paused) return;
                let pos = parseInt(ball.style.top);
                if(pos <= 45 && pos >= 10 && parseInt(ball.style.left)+15 >= zGroup.offsetLeft+15 && parseInt(ball.style.left) <= zGroup.offsetLeft+45) {
                    clearInterval(m); ball.remove(); 
                    zombie.style.filter = "hue-rotate(280deg)";
                    let t = 0;
                    let burn = setInterval(() => {
                        zombieHP -= (damage * 0.5); checkDeath(); t++;
                        if(t >= 15 || zombieHP <= 0) { clearInterval(burn); zombie.style.filter = "none"; }
                    }, 200);
                } else if(pos <= -20) { clearInterval(m); ball.remove(); }
                else { ball.style.top = (pos - 8) + "px"; }
            }, 30);
        }

        function checkDeath() { if(zombieHP <= 0) { coins += 10; wave++; resetEnemy(); createExplosion(zGroup.offsetLeft + 30, 30, "green"); } updateHUD(); }

        function zombieAttack(offsetX = 0) {
            if(paused) return;
            const zb = document.createElement("div");
            zb.className = "z-bullet";
            zb.style.left = (zGroup.offsetLeft + 25 + offsetX) + "px";
            zb.style.top = "40px";
            area.appendChild(zb);
            let pos = 40;
            let m = setInterval(() => {
                if(paused) return;
                if(pos >= 310 && pos <= 340 && parseInt(zb.style.left)+10 > player.offsetLeft && parseInt(zb.style.left) < player.offsetLeft+30) {
                    clearInterval(m); zb.remove();
                    player.style.background = "white"; setTimeout(() => player.style.background = "red", 50);
                    if(shieldHP > 0) shieldHP--; else { playerHP--; if(playerHP <= 0) die(); }
                    updateHUD();
                } else if(pos >= 360) { clearInterval(m); zb.remove(); }
                else { pos += 7; zb.style.top = pos + "px"; }
            }, 40);
        }

        function startLoops() {
            setInterval(() => { if(!paused) zombieAttack(); }, 2000);
            setInterval(() => {
                if(!paused && wave > 3) {
                    zombie.classList.add("z-warning");
                    setTimeout(() => {
                        zombie.classList.remove("z-warning");
                        zombieAttack(-25); zombieAttack(0); zombieAttack(25);
                    }, 800);
                }
            }, 9000);
            // Lógica do Pet
            setInterval(() => { if(!paused && petOwned) shootBullet(); }, 4000);
        }

        function activateSuper() {
            if(superCharge < 100 || paused) return;
            superCharge = 0;
            for(let i = -60; i <= 60; i += 20) { shootBullet(true, i); }
            updateHUD();
        }

        function move(d) {
            if(paused) return;
            let current = player.offsetLeft;
            player.style.left = (d == 'L' ? Math.max(0, current - 30) : Math.min(270, current + 30)) + "px";
            if(petOwned) { pet.style.left = (player.offsetLeft - 20) + "px"; pet.style.top = (player.offsetTop) + "px"; }
            updateHUD();
        }

        function buyUpgrade(t) {
            let cost = (t=='dmg'?10 : t=='hp'?15 : 20);
            if(coins >= cost) { coins -= cost; if(t=='dmg') damage++; if(t=='hp') playerHP += 5; if(t=='shield') { shieldHP = 5; shieldSkill = true; localStorage.setItem("gs_shield_skill", "true"); } updateHUD(); }
        }

        function buyItem(t) {
            let cost = (t=='focus'?100 : 150);
            if(coins >= cost) {
                coins -= cost;
                if(t=='focus') { focusOwned=true; localStorage.setItem("gs_focus","true"); }
                if(t=='pet') { petOwned=true; localStorage.setItem("gs_pet","true"); }
                updateHUD();
            }
        }

        function die() { paused = true; document.getElementById("death-stats").textContent = `ONDA: ${wave}`; document.getElementById("game-over").classList.remove("hidden"); }
        function togglePause() { paused = !paused; }
        function backToLobby() { location.reload(); }
    </script>
</body>
</html>
