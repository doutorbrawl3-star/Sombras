<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerreiro das Sombras</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        #main-menu { position: fixed; inset: 0; background: #000; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .menu-btn { width: 200px; padding: 15px; margin: 10px; background: #333; border: 2px solid #ff0000; color: white; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; }

        h1 { font-size: 18px; margin: 5px 0; color: #ff0000; }
        #game-area { width: 300px; height: 300px; background: #111; margin: 10px auto; position: relative; overflow: hidden; border: 2px solid #333; border-radius: 8px; }
        
        #player, #bullet, #zombie-bullet { position: absolute; }
        #player { width: 30px; height: 30px; background: red; bottom: 10px; left: 135px; border-radius: 4px; z-index: 3; }

        /* GRUPO DO ZUMBI (Zumbi + Barra juntos) */
        #zombie-group {
            position: absolute; width: 60px; height: 55px; /* Largura da barra */
            top: 10px; left: 120px; transition: left 0.2s ease-out;
            display: flex; flex-direction: column; align-items: center;
        }
        #zombie { width: 30px; height: 30px; background: green; border-radius: 4px; position: relative; }
        
        /* Jaleco de Cientista */
        .scientist-coat::after {
            content: ""; position: absolute; top: 5px; left: 5px; width: 20px; height: 25px;
            background: white; border-radius: 2px; clip-path: polygon(0 0, 100% 0, 100% 100%, 70% 100%, 50% 70%, 30% 100%, 0 100%);
        }

        /* BARRA DE VIDA COLADA NO ZUMBI */
        #enemyHPContainer { 
            width: 60px; height: 16px; background: #333; border: 1px solid #000; 
            margin-top: 5px; border-radius: 3px; overflow: hidden; position: relative;
        }
        #enemyHPFill { height: 100%; background: #00ff00; width: 100%; transition: width 0.2s; }
        #enemyHPText { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 9px; }

        #bullet { background: yellow; width: 6px; height: 12px; display: none; z-index: 2; }
        #zombie-bullet { width: 10px; height: 10px; background: yellow; border-radius: 50%; display:none; z-index: 2; }
        #shield { position: absolute; width: 50px; height: 50px; border-radius: 50%; left: 125px; bottom: 0px; z-index: 1; display: none; border: 3px solid cyan; pointer-events: none; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 300px; margin: 0 auto; font-size: 12px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 300px; margin: 10px auto; }
        button { padding: 15px 5px; font-size: 14px; background: #333; color: white; border: 1px solid #555; border-radius: 8px; font-weight: bold; }
        #attack-button { grid-column: 1 / 4; background: #ff4444; font-size: 18px; }

        #store { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid white; padding: 15px; z-index: 1000; width: 280px; }
        .buy-btn { background: #28a745; padding: 5px; font-size: 10px; width: 50px; }
    </style>
</head>
<body>

    <div id="main-menu">
        <h1 style="font-size: 30px;">GUERREIRO DAS SOMBRAS</h1>
        <button class="menu-btn" onclick="startGame()">JOGAR</button>
        <button class="menu-btn" onclick="alert('Skins: Em breve!')">SKINS</button>
    </div>

    <h1>GUERREIRO DAS SOMBRAS</h1>
    <div id="game-area">
        <div id="player"></div>
        <div id="shield"></div>
        
        <div id="zombie-group">
            <div id="zombie"></div>
            <div id="enemyHPContainer">
                <div id="enemyHPFill"></div>
                <div id="enemyHPText">0 HP</div>
            </div>
        </div>

        <div id="bullet"></div>
        <div id="zombie-bullet"></div>
    </div>

    <div class="status-grid">
        <div>💰 Moedas: <span id="coins">0</span></div>
        <div>🌊 Onda: <span id="wave">1</span></div>
        <div>⚔️ Dano: <span id="damage">1</span></div>
        <div>❤️ Vida: <span id="vida">10</span></div>
    </div>

    <div class="controls">
        <button id="left-button">⬅️ ESQ</button>
        <button id="store-button">🛒 LOJA</button>
        <button id="right-button">DIR ➡️</button>
        <button id="attack-button">🔥 ATACAR</button>
        <button id="pause-button" style="grid-column: 1/4; background: #555;">⏸️ PAUSAR</button>
    </div>

    <div id="store">
        <h3>🛒 LOJA DE ELITE</h3>
        <table style="width:100%; font-size: 12px;">
            <tr><td>⚔️ Dano (+1)</td><td>10💰</td><td><button class="buy-btn" onclick="buyDmg()">OK</button></td></tr>
            <tr><td>🫧 Escudo</td><td>20💰</td><td><button class="buy-btn" onclick="buyShield()">OK</button></td></tr>
            <tr><td>💊 Vida (+5)</td><td>15💰</td><td><button class="buy-btn" onclick="buyHP()">OK</button></td></tr>
            <tr><td>⚡ Veloc. Tiro</td><td>30💰</td><td><button class="buy-btn" onclick="buySpeed()">OK</button></td></tr>
        </table>
        <button onclick="document.getElementById('store').style.display='none'" style="margin-top:10px; width:100%; background:red">FECHAR</button>
    </div>

    <script>
        let coins=0, damage=1, wave=1, zombieHP=5, playerHP=10, paused=true, shieldHP=0;
        let shieldLevel=0, shootSpeed=30;
        const shieldColors = ["cyan", "#2ecc71", "#e67e22", "#2980b9", "#8e44ad"];

        const player=document.getElementById("player"), zombie=document.getElementById("zombie"), zGroup=document.getElementById("zombie-group"), shield=document.getElementById("shield");
        const bPlayer=document.getElementById("bullet"), bZombie=document.getElementById("zombie-bullet");

        function startGame() { document.getElementById('main-menu').style.display = 'none'; paused = false; resetEnemy(); }

        function updateBars(){
            document.getElementById("vida").textContent=playerHP;
            document.getElementById("coins").textContent=coins;
            document.getElementById("wave").textContent=wave;
            document.getElementById("damage").textContent=damage;

            let maxHP = (wave===30)?100 : (wave===40)?150 : 5+wave*2;
            document.getElementById("enemyHPFill").style.width=Math.max(0, (zombieHP/maxHP)*100)+"%";
            document.getElementById("enemyHPText").textContent=zombieHP + " HP";
        }

        function resetEnemy(){
            zombie.className = "";
            zombieHP = (wave===30)?100 : (wave===40)?150 : 5+wave*2;
            if(wave===30) zombie.style.background="repeating-linear-gradient(45deg,#000,#000 5px,#fff 5px,#fff 10px)";
            else if(wave===40) { zombie.style.background="purple"; zombie.classList.add("scientist-coat"); }
            else zombie.style.background="green";
            updateBars();
        }

        function moveZombie(){ 
            if(paused) return;
            let n = zGroup.offsetLeft + (Math.random() > 0.5 ? 30 : -30);
            zGroup.style.left = Math.max(0, Math.min(n, 240)) + "px"; // 240 para não sair da tela com a barra larga
        }

        function shootBullet(){
            if(paused || bPlayer.style.display==="block") return;
            bPlayer.style.display="block"; bPlayer.style.left=(player.offsetLeft+12)+"px"; bPlayer.style.top="260px";
            let pos=260;
            let inv = setInterval(()=>{
                if(paused) return;
                // Colisão agora checa o grupo do zumbi
                let zL = zGroup.offsetLeft + 15; // +15 para compensar o centro do zumbi no grupo de 60px
                if(pos <= 40 && pos >= 10 && parseInt(bPlayer.style.left)+5 >= zL && parseInt(bPlayer.style.left) <= zL+30){
                    clearInterval(inv); bPlayer.style.display="none"; zombieHP-=damage;
                    moveZombie(); 
                    if(zombieHP<=0){ coins+=(wave%10===0?20:5); wave++; resetEnemy(); }
                    updateBars();
                } else if(pos <= 0){ clearInterval(inv); bPlayer.style.display="none"; }
                else { pos-=15; bPlayer.style.top=pos+"px"; }
            }, shootSpeed);
        }

        function zombieAttack(){
            if(paused || bZombie.style.display==="block") return;
            bZombie.style.display="block"; bZombie.style.left=(zGroup.offsetLeft+25)+"px"; bZombie.style.top="40px";
            let pos=40;
            let inv = setInterval(()=>{
                if(paused) return;
                let pL = player.offsetLeft;
                if(pos>=270 && parseInt(bZombie.style.left)+10 > pL && parseInt(bZombie.style.left) < pL+30){
                    clearInterval(inv); bZombie.style.display="none";
                    if(shieldHP>0){ shieldHP--; if(shieldHP<=0) shield.style.display="none"; }
                    else { playerHP--; if(playerHP<=0){ alert("FIM DE JOGO!"); location.reload(); } }
                    updateBars();
                } else if(pos>=300){ clearInterval(inv); bZombie.style.display="none"; }
                else { pos+=10; bZombie.style.top=pos+"px"; }
            }, 50);
        }

        function buyDmg(){ if(coins>=10){ coins-=10; damage++; updateBars(); } }
        function buyHP(){ if(coins>=15){ coins-=15; playerHP+=5; updateBars(); } }
        function buySpeed(){ if(coins>=30){ coins-=30; shootSpeed=Math.max(10, shootSpeed-5); updateBars(); } }
        function buyShield(){ if(coins>=20){ coins-=20; shieldLevel++; shieldHP=shieldLevel*3; shield.style.display="block"; shield.style.borderColor=shieldColors[Math.min(shieldLevel-1,4)]; updateBars(); } }

        document.getElementById("attack-button").onclick=shootBullet;
        document.getElementById("left-button").onclick=()=>{ if(!paused) { player.style.left=Math.max(0,player.offsetLeft-30)+"px"; shield.style.left=(player.offsetLeft-10)+"px"; } };
        document.getElementById("right-button").onclick=()=>{ if(!paused) { player.style.left=Math.min(270,player.offsetLeft+30)+"px"; shield.style.left=(player.offsetLeft-10)+"px"; } };
        document.getElementById("store-button").onclick=()=> document.getElementById("store").style.display="block";
        document.getElementById("pause-button").onclick=()=>{ paused=!paused; document.getElementById("pause-button").innerText=paused?"▶️ CONTINUAR":"⏸️ PAUSAR"; };

        setInterval(zombieAttack, 2000); 
        setInterval(() => { if(!paused) moveZombie(); }, 4000); 
    </script>
</body>
</html>
