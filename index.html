<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerreiro das Sombras Pro</title>
    <style>
        body { background: #000; color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .menu-btn { width: 200px; padding: 15px; margin: 10px; background: #111; border: 2px solid #f00; color: #fff; font-size: 18px; font-weight: bold; border-radius: 10px; }
        
        #game-area { width: 300px; height: 350px; background: #111; margin: 10px auto; position: relative; overflow: hidden; border: 2px solid #333; border-radius: 8px; }
        #player { width: 40px; height: 40px; position: absolute; bottom: 10px; left: 130px; z-index: 5; }
        #player img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 5px red); }

        .recurso-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; font-size: 14px; }
        .melhoria-icon { display: inline-block; width: 18px; height: 18px; background: #00008B; border: 1px solid #1E90FF; border-radius: 50%; line-height: 18px; font-weight: bold; font-size: 10px; }
        
        #skins-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #f00; padding: 15px; z-index: 2600; width: 300px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
        .skin-card { background: #1a1a1a; border: 1px solid #444; padding: 10px; margin: 5px 0; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; }
        .skin-card img { width: 40px; height: 40px; border-radius: 50%; }
        .lvl-badge { background: #00008B; color: white; font-size: 9px; padding: 2px 4px; border-radius: 3px; }

        .bullet { background: yellow; width: 6px; height: 12px; position: absolute; z-index: 3; border-radius: 2px; }
        .sheze-bullet { background: #a0f; width: 4px; height: 10px; }
        .vrack-blackhole { background: #303; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #f0f; }

        #zombie-group { position: absolute; width: 60px; height: 80px; top: 10px; left: 120px; display: flex; flex-direction: column; align-items: center; z-index: 4; }
        #zombie { width: 30px; height: 30px; background: green; border-radius: 4px; }
        #enemyHPContainer { width: 60px; height: 10px; background: #333; border: 1px solid #fff; margin-top: 5px; border-radius: 2px; overflow: hidden; }
        #enemyHPFill { height: 100%; background: #0f0; width: 100%; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; width: 300px; margin: 0 auto; font-size: 12px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; width: 300px; margin: 10px auto; }
        button { padding: 12px 5px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; font-weight: bold; }
        #store { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #fff; padding: 15px; z-index: 2500; width: 260px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1 style="color:red; font-size: 24px;">GUERREIRO DAS SOMBRAS</h1>
        <div class="recurso-bar">
            <div>🌑 <span id="menu-sombrios">0</span></div>
            <div><span class="melhoria-icon">Ⓜ️</span> <span id="menu-melhorias">0</span></div>
            <div>🏆 <span id="menu-poder">0</span></div>
        </div>
        <button class="menu-btn" onclick="startGame()">JOGAR</button>
        <button class="menu-btn" style="border-color:orange" onclick="openSkins()">SOMBRAS</button>
    </div>

    <div id="skins-menu">
        <h3 style="color:cyan">MINHAS SOMBRAS</h3>
        <div id="skins-list"></div>
        <button onclick="document.getElementById('skins-menu').style.display='none'" style="width:100%; background:red">FECHAR</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color:red">GAME OVER</h1>
        <div id="gain-stats" style="margin: 10px; color:#0f0;"></div>
        <button class="menu-btn" onclick="location.reload()">LOBBY</button>
    </div>

    <div id="game-area">
        <div id="player"><img id="player-img" src=""></div>
        <div id="shield" style="position:absolute; width:50px; height:50px; border-radius:50%; border:3px solid cyan; display:none; z-index:6;"></div>
        <div id="zombie-group">
            <div id="zombie"></div>
            <div id="enemyHPContainer"><div id="enemyHPFill"></div></div>
        </div>
    </div>

    <div class="status-grid">
        <div>🌊 Onda: <span id="wave">1</span></div>
        <div>⚔️ Dano: <span id="damage-display">1</span></div>
        <div>❤️ Vida: <span id="vida">10</span></div>
        <div>💰 Moedas: <span id="coins-display">0</span></div>
    </div>

    <div class="controls">
        <button onclick="move('L')">⬅️</button>
        <button onclick="document.getElementById('store').style.display='block'">🛒 LOJA</button>
        <button onclick="move('R')">➡️</button>
        <button id="attack-button" style="grid-column: 1/3; background: #f44;" onclick="shootBullet()">🔥 ATACAR</button>
        <button onclick="activateSuper()">✨ SUPER</button>
        <button onclick="togglePause()" style="grid-column:1/4">⏸️ PAUSAR</button>
    </div>

    <div id="store">
        <h3 style="color:orange">LOJA</h3>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('dmg')">DANO +1 (10💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('hp')">VIDA +5 (15💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyItem('shield')">ESCUDO (20💰)</button>
        <button onclick="document.getElementById('store').style.display='none'" style="width:100%; background:red">FECHAR</button>
    </div>

    <script>
        const SKINS = [
            { id: "zark", name: "Zark", baseDmg: 1, baseHP: 10, url: "https://i.ibb.co/WWhT8VPG/bico.jpg" },
            { id: "dexyz", name: "Dexyz", baseDmg: 1, baseHP: 12, url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnvh8TAdmT-ayeFiZZ8VoQYWtXSSE4rw4SnIzju8HP2SWsD-gIiVqsFe2D&s=10" },
            { id: "sheze", name: "Sheze", baseDmg: 1, baseHP: 8, url: "https://w7.pngwing.com/pngs/704/727/png-transparent-overwatch-sombra-pixel-art-widowmaker-cave-thumbnail.png" },
            { id: "vrack", name: "Vrack", baseDmg: 3, baseHP: 15, url: "https://w7.pngwing.com/pngs/341/329/png-transparent-overwatch-pixel-art-bead-pixel-gun-video-game-bead-fictional-character-thumbnail.png" }
        ];

        let sombrios = parseInt(localStorage.getItem("gs_sombrios")) || 0;
        let melhorias = parseInt(localStorage.getItem("gs_melhorias")) || 0;
        let trofeusMap = JSON.parse(localStorage.getItem("gs_trofeus")) || {zark:0, dexyz:0, sheze:0, vrack:0};
        let lvlsMap = JSON.parse(localStorage.getItem("gs_lvls")) || {zark:1, dexyz:1, sheze:1, vrack:1};
        let ownedSkins = JSON.parse(localStorage.getItem("gs_owned_ids")) || ["zark"];
        let currentSkinId = localStorage.getItem("gs_current_id") || "zark";

        let coins=0, upgradeDanoPartida=0, wave=1, playerHP=10, paused=true, shieldHP=0, zombieHP=5, zombieMaxHP=5, superCharge=0, canShoot=true, totalMelhoriasPartida=0;
        const area = document.getElementById("game-area"), zGroup = document.getElementById("zombie-group"), zombie = document.getElementById("zombie");

        function updateMenuInfo() {
            document.getElementById("menu-sombrios").textContent = sombrios;
            document.getElementById("menu-melhorias").textContent = melhorias;
            document.getElementById("menu-poder").textContent = Object.values(trofeusMap).reduce((a, b) => a + b, 0);
            document.getElementById("player-img").src = SKINS.find(s => s.id === currentSkinId).url;
        }
        updateMenuInfo();

        function openSkins() {
            const list = document.getElementById("skins-list"); list.innerHTML = "";
            SKINS.forEach(s => {
                const isOwned = ownedSkins.includes(s.id);
                const lvl = lvlsMap[s.id] || 1;
                const costM = lvl * 20, costS = lvl * 10;
                list.innerHTML += `<div class="skin-card">
                    <img src="${s.url}"><div style="flex:1; margin-left:10px; text-align:left;">
                        <span>${s.name} <span class="lvl-badge">P${lvl}</span></span><br>
                        ${lvl < 11 && isOwned ? `<button onclick="upgradeBrawler('${s.id}',${costM},${costS})" style="font-size:9px;">UP:Ⓜ️${costM}</button>` : ''}
                    </div>
                    <button onclick="${isOwned ? `selectSkin('${s.id}')` : `buySkin('${s.id}',50)`}" style="font-size:10px;">${isOwned?'USAR':'50🌑'}</button>
                </div>`;
            });
            document.getElementById('skins-menu').style.display='block';
        }

        function upgradeBrawler(id, cm, cs) {
            if(melhorias >= cm && sombrios >= cs) {
                melhorias -= cm; sombrios -= cs; lvlsMap[id]++;
                localStorage.setItem("gs_melhorias", melhorias); localStorage.setItem("gs_sombrios", sombrios);
                localStorage.setItem("gs_lvls", JSON.stringify(lvlsMap)); updateMenuInfo(); openSkins();
            }
        }

        function selectSkin(id) { currentSkinId = id; localStorage.setItem("gs_current_id", id); updateMenuInfo(); document.getElementById('skins-menu').style.display='none'; }

        function startGame() {
            paused=false; canShoot=true; coins=0; upgradeDanoPartida=0; wave=1; totalMelhoriasPartida=0;
            document.getElementById("main-menu").classList.add("hidden");
            const s = SKINS.find(x => x.id === currentSkinId);
            playerHP = Math.round(s.baseHP * (1 + (lvlsMap[currentSkinId]-1)*0.2));
            resetEnemy();
            // Inicia os loops do jogo
            if(window.gameInterval) clearInterval(window.gameInterval);
            window.gameInterval = setInterval(() => { if(!paused) enemyFire(); }, 2000);
        }

        function resetEnemy() {
            zombieMaxHP = 5 + (wave * 3);
            zombieHP = zombieMaxHP;
            zGroup.style.left = "120px";
            updateHUD();
        }

        function getRealDamage() {
            const skin = SKINS.find(s => s.id === currentSkinId);
            const lvlBonus = lvlsMap[currentSkinId]-1;
            if(currentSkinId === "dexyz") return 1 + upgradeDanoPartida + Math.floor(lvlBonus/2);
            return skin.baseDmg + upgradeDanoPartida + lvlBonus;
        }

        function updateHUD() {
            document.getElementById("vida").textContent = playerHP;
            document.getElementById("coins-display").textContent = coins;
            document.getElementById("wave").textContent = wave;
            document.getElementById("damage-display").textContent = (currentSkinId==="dexyz") ? (getRealDamage()*2) : getRealDamage();
            document.getElementById("enemyHPFill").style.width = (zombieHP/zombieMaxHP)*100+"%";
        }

        function shootBullet(isSuper=false, off=0, angle=0) {
            if(paused || (!isSuper && !canShoot)) return;
            if(!isSuper) {
                canShoot = false;
                setTimeout(() => { canShoot = true; }, (currentSkinId === "vrack" ? 1400 : 500));
                if(currentSkinId === "dexyz") { shootBullet(true, -12); shootBullet(true, 12); return; }
                if(currentSkinId === "sheze") { shootBullet(true,0); setTimeout(()=>shootBullet(true,0),100); return; }
            }
            const b = document.createElement("div");
            b.className = currentSkinId === "vrack" ? "bullet vrack-blackhole" : "bullet";
            b.style.left = (document.getElementById("player").offsetLeft + 15 + off) + "px";
            b.style.top = "300px"; area.appendChild(b);

            let m = setInterval(() => {
                if(paused) return;
                let top = parseInt(b.style.top);
                if(top <= 60 && top >= 10 && parseInt(b.style.left) >= zGroup.offsetLeft - 10 && parseInt(b.style.left) <= zGroup.offsetLeft + 50) {
                    clearInterval(m); b.remove();
                    zombieHP -= getRealDamage();
                    if(zombieHP <= 0) { wave++; coins+=10; if(wave%2===0) totalMelhoriasPartida++; resetEnemy(); }
                    updateHUD();
                } else if(top < 0) { clearInterval(m); b.remove(); }
                else { b.style.top = (top - 10) + "px"; }
            }, 30);
        }

        function move(d) {
            if(paused) return;
            let p = document.getElementById("player");
            let pos = p.offsetLeft;
            p.style.left = (d === 'L' ? Math.max(0, pos - 30) : Math.min(260, pos + 30)) + "px";
            updateHUD();
        }

        function enemyFire() {
            const zb = document.createElement("div");
            zb.style.cssText="position:absolute;width:10px;height:10px;background:orange;border-radius:50%;top:40px;";
            zb.style.left = (zGroup.offsetLeft + 25) + "px"; area.appendChild(zb);
            let pos = 40;
            let m = setInterval(() => {
                if(paused) return; pos += 6; zb.style.top = pos + "px";
                let pL = document.getElementById("player").offsetLeft;
                if(pos >= 310 && pos <= 340 && parseInt(zb.style.left) >= pL && parseInt(zb.style.left) <= pL+40) {
                    clearInterval(m); zb.remove();
                    if(shieldHP > 0) { shieldHP--; if(shieldHP<=0) document.getElementById("shield").style.display="none"; } 
                    else { playerHP--; }
                    if(playerHP <= 0) die();
                    updateHUD();
                } else if(pos > 360) { clearInterval(m); zb.remove(); }
            }, 40);
        }

        function buyUpgrade(t) { if(coins >= 10) { coins -= 10; if(t==='dmg') upgradeDanoPartida++; else playerHP+=5; updateHUD(); } }
        function buyItem(t) { if(coins >= 20) { coins -= 20; shieldHP=5; document.getElementById("shield").style.display="block"; updateHUD(); } }
        function togglePause() { paused = !paused; }

        function die() {
            paused = true;
            sombrios += Math.floor(wave * 2);
            melhorias += totalMelhoriasPartida;
            localStorage.setItem("gs_sombrios", sombrios);
            localStorage.setItem("gs_melhorias", melhorias);
            document.getElementById("gain-stats").innerHTML = `+${totalMelhoriasPartida} Ⓜ️ Melhorias Sombrias<br>+${Math.floor(wave*2)} 🌑 Sombrios`;
            document.getElementById("game-over").classList.remove("hidden");
        }
    </script>
</body>
</html>
