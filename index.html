<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/jpeg" href="bico.jpg">
    <link rel="apple-touch-icon" href="bico.jpg">
    <link rel="manifest" href="manifest.json">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000"> 

    <title>Guerreiro das Sombras</title>

    <style>
        /* CSS Unificado (com ajustes para mobile) */
        body { 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* Evita rolar a tela no celular */
            user-select: none; /* Evita selecionar texto ao clicar rápido */
        }

        h1 { font-size: 18px; margin: 5px 0; color: #ff0000; }

        #game-area { 
            width: 300px; 
            height: 300px; 
            background: #111; 
            margin: 10px auto; 
            position: relative; 
            overflow: hidden; 
            border: 2px solid #333;
            border-radius: 8px;
        }

        #player, #zombie, #bullet, #zombie-bullet, #chest { position: absolute; }
        #player, #zombie, #chest { width: 30px; height: 30px; }

        #player { background: red; bottom: 0; left: 135px; border-radius: 4px; z-index: 3; }
        #zombie { background: green; top: 0; left: 135px; border-radius: 4px; }
        
        #bullet { background: yellow; z-index: 2; width: 5px; height: 10px; display: none; }
        #zombie-bullet { width: 10px; height: 10px; background: yellow; border-radius: 50%; z-index: 2; display:none; }

        #chest { background: yellow; border-top: 6px solid brown; border-radius: 4px; display: none; }
        #shield { 
            position: absolute; width: 50px; height: 50px; border-radius: 50%; 
            left: 125px; bottom: -10px; z-index: 1; display: none; border: 2px solid cyan; 
        }

        /* Status */
        .status-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 5px; 
            width: 300px; 
            margin: 0 auto; 
            font-size: 12px;
        }

        /* Controles do Celular */
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 10px; 
            width: 300px; 
            margin: 10px auto;
        }

        button { 
            padding: 15px 5px; 
            font-size: 14px; 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            border-radius: 8px;
            font-weight: bold;
        }

        #attack-button { 
            grid-column: 1 / 4; 
            background: #ff4444; 
            font-size: 18px; 
        }

        /* Loja e Barras */
        #enemyHPContainer {
            position: absolute; width: 60px; height: 12px; background: #444;
            border: 1px solid white; display: none; font-size: 10px;
        }
        #enemyHPFill { height: 100%; background: lime; color: black; font-weight: bold; }
        #player-health-bar { height: 5px; position: absolute; background: red; bottom: -8px; width: 30px; }

        #store {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid white; padding: 15px; z-index: 1000; width: 260px;
        }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { border: 1px solid #444; padding: 5px; }
        
        #store-indicator { 
            display: none; position: absolute; top: -5px; right: -5px;
            width: 12px; height: 12px; background: orange; border-radius: 50%; 
        }
    </style>
</head>
<body>

    <h1>GUERREIRO DAS SOMBRAS</h1>
    
    <div id="game-area">
        <div id="player"><div id="player-health-bar"></div></div>
        <div id="shield"></div>
        <div id="zombie"></div>
        <div id="chest"></div>
        <div id="enemyHPContainer"><div id="enemyHPFill">HP: 0</div></div>
        <div id="bullet"></div>
        <div id="zombie-bullet"></div>
    </div>

    <div class="status-grid">
        <div>💰 Moedas: <span id="coins">0</span></div>
        <div>🌊 Onda: <span id="wave">1</span></div>
        <div>⚔️ Dano: <span id="damage">1</span></div>
        <div>❤️ Vida: <span id="vida">10</span></div>
    </div>

    <div class="controls">
        <button id="left-button">⬅️ ESQ</button>
        <div style="position:relative">
            <button id="store-button" style="width:100%">🛒 LOJA</button>
            <div id="store-indicator"></div>
        </div>
        <button id="right-button">DIR ➡️</button>
        <button id="attack-button">🔥 ATACAR</button>
        <button id="pause-button" style="grid-column: 1/4; background: #555;">⏸️ PAUSAR</button>
    </div>





    <div id="store">
        <h3 style="margin:0 0 10px 0">🛒 LOJA DE UPGRADES</h3>
        <table>
            <tr><td>Dano (+1)</td><td>10💰</td><td><button id="buy-upgrade">OK</button></td></tr>
            <tr><td>Escudo 🫧</td><td id="shield-price">20💰</td><td><button id="buy-shield">OK</button></td></tr>
        </table>
        <button id="close-store" style="margin-top:10px; width:100%; background:red">FECHAR</button>
    </div>

    <audio id="shoot-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        /* JavaScript Unificado e Adaptado */
        let coins=0, damage=1, wave=1;
        let zombieHP=5, playerHP=10, paused=false, chestHP=32, shieldHP=0;
        let shieldLevel=1, shieldCost=20, hitsOnZombie=0;

        const player=document.getElementById("player");
        const shield=document.getElementById("shield");
        const zombie=document.getElementById("zombie");
        const chest=document.getElementById("chest");
        const bullet=document.getElementById("bullet");
        const zombieBullet=document.getElementById("zombie-bullet");
        const playerBar=document.getElementById("player-health-bar");
        const store=document.getElementById("store");

        function updateBars(){
            document.getElementById("player-health-bar").style.width=(playerHP/10*30)+"px";
            document.getElementById("vida").textContent=playerHP;
            let currentHP, maxHP, enemy;
            if(wave===15){ currentHP=chestHP; maxHP=32; enemy=chest; }
            else { currentHP=zombieHP; maxHP=5+wave*2; enemy=zombie; }
            
            const container = document.getElementById("enemyHPContainer");
            container.style.display="block";
            container.style.top=(enemy.offsetTop - 15) + "px";
            container.style.left=enemy.offsetLeft + "px";
            
            let percent=Math.max(0, (currentHP/maxHP)*100);
            document.getElementById("enemyHPFill").style.width=percent+"%";
            document.getElementById("enemyHPFill").textContent=currentHP;
        }

        function updateStoreIndicator(){
            document.getElementById("store-indicator").style.display=(coins>=10)?"block":"none";
        }

        function attackEnemy(){
            if(wave===15){
                chestHP -= damage;
                if(chestHP<=0){ coins+=15; wave++; resetEnemy(); }
            } else {
                zombieHP -= damage;
                hitsOnZombie++;
                if(hitsOnZombie>=3){ moveZombie(); hitsOnZombie=0; }
                if(zombieHP<=0){ coins+=5; wave++; resetEnemy(); }
            }
            document.getElementById("coins").textContent=coins;
            document.getElementById("wave").textContent=wave;
            updateBars(); updateStoreIndicator();
        }

        function shootBullet(){
            if(paused) return;
            document.getElementById("shoot-sound").play();
            bullet.style.display="block";
            bullet.style.left=player.offsetLeft+12+"px";
            bullet.style.top="270px";
            let pos=270;
            const interval=setInterval(()=>{
                if(paused) return;
                let enemy = (wave===15) ? chest : zombie;
                if(pos <= enemy.offsetTop+30 && pos >= enemy.offsetTop && parseInt(bullet.style.left)+5 >= enemy.offsetLeft && parseInt(bullet.style.left) <= enemy.offsetLeft+30){
                    clearInterval(interval); bullet.style.display="none"; attackEnemy();
                } else if(pos <= 0){ clearInterval(interval); bullet.style.display="none"; }
                else { pos-=15; bullet.style.top=pos+"px"; }
            }, 30);
        }

        function shootZombieBullet(){
            if(paused || wave===15) return;
            zombieBullet.style.display="block";
            zombieBullet.style.left=zombie.offsetLeft+10+"px";
            zombieBullet.style.top="30px";
            let pos=30;
            const interval=setInterval(()=>{
                if(paused) return;
                if(pos>=270 && parseInt(zombieBullet.style.left)+10 > player.offsetLeft && parseInt(zombieBullet.style.left) < player.offsetLeft+30){
                    clearInterval(interval); zombieBullet.style.display="none";
                    if(shieldHP>0){ shieldHP--; if(shieldHP<=0) shield.style.display="none"; }
                    else { playerHP--; if(playerHP<=0){ alert("FIM DE JOGO!"); location.reload(); } }
                    updateBars(); return;
                }
                if(pos>=300){ clearInterval(interval); zombieBullet.style.display="none"; return; }
                pos+=10; zombieBullet.style.top=pos+"px";
            }, 60);
        }

        function moveZombie(){
            let newLeft=zombie.offsetLeft+(Math.random()>0.5?30:-30);
            zombie.style.left=Math.max(0,Math.min(newLeft,270))+"px";
        }

        function resetEnemy(){
            chest.style.display=(wave===15)?"block":"none";
            zombie.style.display=(wave===15)?"none":"block";
            if(wave===15) chestHP=32; else zombieHP=5+wave*2;
            updateBars();
        }

        // Eventos dos botões
        document.getElementById("attack-button").onclick=shootBullet;
        document.getElementById("left-button").onclick=()=>{ if(!paused) { player.style.left=Math.max(0,player.offsetLeft-30)+"px"; shield.style.left=player.offsetLeft-10+"px"; }};
        document.getElementById("right-button").onclick=()=>{ if(!paused) { player.style.left=Math.min(270,player.offsetLeft+30)+"px"; shield.style.left=player.offsetLeft-10+"px"; }};
        document.getElementById("store-button").onclick=()=>store.style.display="block";
        document.getElementById("close-store").onclick=()=>store.style.display="none";

        document.getElementById("buy-upgrade").onclick=()=>{
            if(coins>=10){ coins-=10; damage++; document.getElementById("damage").textContent=damage; document.getElementById("coins").textContent=coins; updateStoreIndicator(); }
        };

        document.getElementById("buy-shield").onclick=()=>{
            if(coins>=shieldCost){
                coins-=shieldCost; shieldHP=2+shieldLevel*2; shield.style.display="block";
                shieldLevel++; shieldCost+=20; document.getElementById("shield-price").textContent=shieldCost+"💰";
                document.getElementById("coins").textContent=coins; store.style.display="none";
            }
        };

        document.getElementById("pause-button").onclick=()=>{ paused=!paused; document.getElementById("pause-button").innerText = paused ? "▶️ CONTINUAR" : "⏸️ PAUSAR"; };
        
        // Iniciar loops
        setInterval(shootZombieBullet, 2000);
        resetEnemy(); updateBars(); updateStoreIndicator();
    </script>
</body>
  </html>
