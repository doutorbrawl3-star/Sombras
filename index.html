<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="theme-color" content="#ff0000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerreiro das Sombras Pro</title>
    <style>
        body { background: #000; color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .menu-btn { width: 220px; padding: 15px; margin: 10px; background: #111; border: 2px solid #f00; color: #fff; font-size: 18px; font-weight: bold; border-radius: 10px; }
        
        #game-area { width: 300px; height: 350px; background: #111; margin: 10px auto; position: relative; overflow: hidden; border: 2px solid #333; border-radius: 8px; }
        #player { width: 40px; height: 40px; position: absolute; bottom: 10px; left: 130px; z-index: 5; }
        #player img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 5px red); }

        .sombrio-icon { display: inline-block; width: 16px; height: 16px; background: #444; border: 2px solid #777; border-radius: 50%; vertical-align: middle; position: relative; }
        .sombrio-icon::after { content: 'S'; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #bbb; font-weight: bold; }
        .melhoria-icon { display: inline-block; width: 18px; height: 18px; background: #00008B; border: 2px solid #1E90FF; border-radius: 50%; vertical-align: middle; color: white; font-size: 10px; font-weight: bold; line-height: 18px; }
        .trofeu-icon { display: inline-block; width: 18px; height: 18px; background: #555; border: 2px solid #888; border-radius: 50%; vertical-align: middle; position: relative; }
        .trofeu-icon::after { content: '🏆'; font-size: 10px; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); filter: grayscale(1); }

        #missions-menu, #skins-menu, #store { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #fff; padding: 15px; z-index: 2600; width: 300px; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .mission-card { background: #222; padding: 10px; margin: 8px 0; border-radius: 5px; border-left: 4px solid orange; text-align: left; }
        .progress-bar { width: 100%; height: 8px; background: #444; margin-top: 5px; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: orange; width: 0%; transition: 0.3s; }
        .btn-collect { background: #0f0; color: #000; border: none; padding: 5px; border-radius: 4px; font-weight: bold; width: 100%; margin-top: 5px; }

        .bullet { background: yellow; width: 6px; height: 12px; position: absolute; z-index: 3; border-radius: 2px; }
        .disco-dexyz { background: #0ff; width: 18px; height: 6px; border-radius: 10px; }
        .vrack-blackhole { background: #303; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #f0f; }

        #zombie-group { position: absolute; width: 60px; height: 80px; top: 10px; left: 120px; display: flex; flex-direction: column; align-items: center; z-index: 4; }
        #zombie { width: 30px; height: 30px; background: green; border-radius: 4px; }
        .z-boss { width: 55px !important; height: 55px !important; box-shadow: 0 0 15px red; }
        .z-bullet-track { background: #f0f !important; box-shadow: 0 0 8px #f0f; }

        #enemyHPContainer { width: 70px; height: 16px; background: #333; border: 1px solid #fff; margin-top: 5px; border-radius: 3px; overflow: hidden; position: relative; }
        #enemyHPFill { height: 100%; background: #0f0; width: 100%; }
        #enemyHPText { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 10px; z-index: 10; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 310px; margin: 0 auto; font-size: 13px; font-weight: bold; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 300px; margin: 10px auto; }
        button { padding: 15px 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1 style="color:red">GUERREIRO DAS SOMBRAS</h1>
        <div style="margin-bottom:10px; display: flex; justify-content: center; gap: 15px;">
            <div><div class="sombrio-icon"></div> <span id="menu-sombrios">0</span></div>
            <div><div class="melhoria-icon">Ⓜ️</div> <span id="menu-melhorias">0</span></div>
            <div><div class="trofeu-icon"></div> <span id="menu-poder-total">0</span></div>
        </div>
        <button class="menu-btn" onclick="startGame()">JOGAR</button>
        <div style="display:flex; justify-content:center; gap: 10px;">
             <button class="menu-btn" style="width:105px; font-size:12px; border-color:orange" onclick="openSkins()">SOMBRAS</button>
             <button class="menu-btn" style="width:105px; font-size:12px; border-color:cyan" onclick="openMissions()">📜 MISSÕES</button>
        </div>
    </div>

    <div id="missions-menu">
        <h3 style="color:orange; margin-top:0;">MISSÕES</h3>
        <div id="mission-list"></div>
        <button class="menu-btn" style="width:100%; background:red" onclick="document.getElementById('missions-menu').style.display='none'">FECHAR</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color:red">GAME OVER</h1>
        <div id="gain-stats" style="margin: 10px; color: #0f0;"></div>
        <button class="menu-btn" onclick="location.reload()">LOBBY</button>
    </div>

    <div id="game-area">
        <div id="player"><img id="player-img" src=""></div>
        <div id="shield" style="position:absolute; width:50px; height:50px; border-radius:50%; border:3px solid cyan; display:none; pointer-events:none; z-index:6;"></div>
        <div id="zombie-group">
            <div id="zombie"></div>
            <div id="enemyHPContainer"><div id="enemyHPFill"></div><div id="enemyHPText">0 HP</div></div>
        </div>
    </div>

    <div class="status-grid">
        <div>🌊 Onda: <span id="wave">1</span></div>
        <div>⚔️ Dano: <span id="damage-display">1</span></div>
        <div>❤️ Vida: <span id="vida">10</span></div>
        <div>💰 Moedas: <span id="coins-display">0</span></div>
    </div>

    <div class="controls">
        <button onclick="move('L')">⬅️</button>
        <button onclick="document.getElementById('store').style.display='block'">🛒 LOJA</button>
        <button onclick="move('R')">➡️</button>
        <button id="attack-button" style="grid-column: 1/3; background: #f44;" onclick="shootBullet()">🔥 ATACAR</button>
        <button onclick="activateSuper()">✨ SUPER</button>
        <button onclick="togglePause()" style="grid-column:1/4">⏸️ PAUSAR</button>
    </div>

    <div id="skins-menu">
        <h3 style="color:cyan">MINHAS SOMBRAS</h3>
        <div id="skins-list"></div>
        <button class="menu-btn" style="width:100%; background:red" onclick="document.getElementById('skins-menu').style.display='none'">FECHAR</button>
    </div>

    <div id="store">
        <h3 style="color:orange">LOJA DA PARTIDA</h3>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('dmg')">DANO +1 (10💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('hp')">VIDA +5 (15💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyItem('shield')">ESCUDO (20💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyItem('pet')">PET (150💰)</button>
        <button style="width:100%;background:red" onclick="document.getElementById('store').style.display='none'">FECHAR</button>
    </div>

    <script>
        const SKINS = [
            { id: "zark", name: "Zark", baseDmg: 1, baseHP: 10, url: "https://i.ibb.co/WWhT8VPG/bico.jpg" },
            { id: "dexyz", name: "Dexyz", baseDmg: 1, baseHP: 12, url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnvh8TAdmT-ayeFiZZ8VoQYWtXSSE4rw4SnIzju8HP2SWsD-gIiVqsFe2D&s=10" },
            { id: "sheze", name: "Sheze", baseDmg: 1, baseHP: 8, url: "https://w7.pngwing.com/pngs/704/727/png-transparent-overwatch-sombra-pixel-art-widowmaker-cave-thumbnail.png" },
            { id: "vrack", name: "Vrack", baseDmg: 3, baseHP: 15, url: "https://w7.pngwing.com/pngs/341/329/png-transparent-overwatch-pixel-art-bead-pixel-gun-video-game-bead-fictional-character-thumbnail.png" }
        ];

        let sombrios = parseInt(localStorage.getItem("gs_sombrios")) || 0;
        let melhorias = parseInt(localStorage.getItem("gs_melhorias")) || 0;
        let trofeusMap = JSON.parse(localStorage.getItem("gs_trofeus")) || {zark:0, dexyz:0, sheze:0, vrack:0};
        let lvlsMap = JSON.parse(localStorage.getItem("gs_lvls")) || {zark:1, dexyz:1, sheze:1, vrack:1};
        let ownedSkins = JSON.parse(localStorage.getItem("gs_owned_ids")) || ["zark"];
        let currentSkinId = localStorage.getItem("gs_current_id") || "zark";

        let missionData = JSON.parse(localStorage.getItem("gs_missions")) || [
            { id: 0, title: "Eliminar 20 Zumbis", goal: 20, progress: 0, reward: 10, collected: false },
            { id: 1, title: "Chegar na Onda 10", goal: 10, progress: 0, reward: 15, collected: false }
        ];

        let coins=0, upgradeDanoPartida=0, wave=1, playerHP=10, paused=true, shieldHP=0, zombieHP=5, zombieMaxHP=5, superCharge=0, canShoot=true, petOwned=false, totalMelhoriasPartida=0;
        const area=document.getElementById("game-area"), zGroup=document.getElementById("zombie-group"), zombie=document.getElementById("zombie");

        function updateMenuInfo() {
            document.getElementById("menu-sombrios").textContent = sombrios;
            document.getElementById("menu-melhorias").textContent = melhorias;
            document.getElementById("menu-poder-total").textContent = Object.values(trofeusMap).reduce((a, b) => a + b, 0);
            document.getElementById("player-img").src = SKINS.find(s => s.id === currentSkinId).url;
        }
        updateMenuInfo();

        function openMissions() {
            const list = document.getElementById("mission-list"); list.innerHTML = "";
            missionData.forEach((m, idx) => {
                const perc = Math.min(100, (m.progress/m.goal)*100);
                list.innerHTML += `<div class="mission-card"><h4>${m.title}</h4><div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div><small>${m.progress}/${m.goal}</small>${m.progress>=m.goal && !m.collected ? `<button class="btn-collect" onclick="collectMission(${idx})">COLETAR 🌑${m.reward}</button>` : m.collected ? ' ✅' : ''}</div>`;
            });
            document.getElementById("missions-menu").style.display = "block";
        }
        function collectMission(idx) { sombrios += missionData[idx].reward; missionData[idx].collected = true; localStorage.setItem("gs_missions", JSON.stringify(missionData)); updateMenuInfo(); openMissions(); }

        function openSkins() {
            const list = document.getElementById("skins-list"); list.innerHTML = "";
            SKINS.forEach(s => {
                const lvl = lvlsMap[s.id]; const isOwned = ownedSkins.includes(s.id);
                const cm = lvl*20, cs = lvl*10;
                list.innerHTML += `<div class="skin-card"><img src="${s.url}"><div style="flex:1;margin-left:10px;text-align:left;"><span>${s.name} <span class="lvl-badge">P${lvl}</span></span><br>${isOwned && lvl<11 ? `<button onclick="upgradeBrawler('${s.id}',${cm},${cs})" style="font-size:9px;">UP:Ⓜ️${cm}</button>` : ''}</div><button onclick="${isOwned ? `selectSkin('${s.id}')` : `buySkin('${s.id}',50)`}">${isOwned?'USAR':'50🌑'}</button></div>`;
            });
            document.getElementById('skins-menu').style.display='block';
        }

        function upgradeBrawler(id, cm, cs) { if(melhorias>=cm && sombrios>=cs) { melhorias-=cm; sombrios-=cs; lvlsMap[id]++; localStorage.setItem("gs_melhorias", melhorias); localStorage.setItem("gs_sombrios", sombrios); localStorage.setItem("gs_lvls", JSON.stringify(lvlsMap)); updateMenuInfo(); openSkins(); } }
        function selectSkin(id) { currentSkinId = id; localStorage.setItem("gs_current_id", id); updateMenuInfo(); document.getElementById('skins-menu').style.display='none'; }

        function startGame() { 
            paused=false; canShoot=true; totalMelhoriasPartida=0; coins=0; upgradeDanoPartida=0; wave=1;
            document.getElementById("main-menu").classList.add("hidden"); 
            playerHP = Math.round(SKINS.find(s=>s.id===currentSkinId).baseHP * (1+(lvlsMap[currentSkinId]-1)*0.2));
            resetEnemy(); startLoops(); 
        }

        function resetEnemy() {
            zombieMaxHP = (wave%10===0) ? wave*12 : 5+(wave*3);
            if(wave%10===0) zombie.classList.add("z-boss"); else zombie.classList.remove("z-boss");
            zombieHP = zombieMaxHP; zGroup.style.left = "120px"; updateHUD();
        }

        function updateHUD() {
            document.getElementById("vida").textContent = playerHP; document.getElementById("coins-display").textContent = coins;
            document.getElementById("wave").textContent = wave;
            let d = SKINS.find(s=>s.id===currentSkinId).baseDmg + upgradeDanoPartida + (lvlsMap[currentSkinId]-1);
            document.getElementById("damage-display").textContent = (currentSkinId==="dexyz") ? d*2 : d;
            document.getElementById("enemyHPFill").style.width = (zombieHP/zombieMaxHP)*100+"%";
            document.getElementById("enemyHPText").textContent = Math.ceil(zombieHP)+" HP";
            if(shieldHP>0) { document.getElementById("shield").style.display="block"; document.getElementById("shield").style.left=(document.getElementById("player").offsetLeft-5)+"px"; document.getElementById("shield").style.top=(document.getElementById("player").offsetTop-5)+"px"; } else document.getElementById("shield").style.display="none";
        }

        function shootBullet(isSuper=false, off=0, angle=0) {
            if(paused || (!isSuper && !canShoot)) return;
            if(!isSuper) { canShoot=false; setTimeout(()=>canShoot=true, (currentSkinId==="vrack"?1400:500)); if(currentSkinId==="dexyz"){shootBullet(true,-12);shootBullet(true,12);return;} }
            const b = document.createElement("div"); b.className = "bullet";
            if(currentSkinId==="dexyz") b.classList.add("disco-dexyz");
            if(currentSkinId==="vrack") b.classList.add("vrack-blackhole");
            b.style.left = (document.getElementById("player").offsetLeft + 15 + off) + "px"; b.style.top = "300px"; area.appendChild(b);
            let m = setInterval(() => {
                if(paused) return; let top = parseInt(b.style.top), left = parseInt(b.style.left);
                if(top <= 60 && top >= 10 && left >= zGroup.offsetLeft - 5 && left <= zGroup.offsetLeft + 50) {
                    clearInterval(m); b.remove(); zombieHP -= (SKINS.find(s=>s.id===currentSkinId).baseDmg + upgradeDanoPartida + (lvlsMap[currentSkinId]-1));
                    superCharge = Math.min(100, superCharge + 5);
                    if(zombieHP<=0) { wave++; coins+=10; if(wave%2===0) totalMelhoriasPartida++; missionData[0].progress++; missionData[1].progress=Math.max(missionData[1].progress, wave); localStorage.setItem("gs_missions", JSON.stringify(missionData)); resetEnemy(); }
                    updateHUD();
                } else if(top < -20) { clearInterval(m); b.remove(); } else b.style.top = (top - 10) + "px";
            }, 30);
        }

        function activateSuper() { if(superCharge<100) return; superCharge=0; if(currentSkinId==="vrack") zombieHP-=50; else for(let i=-60;i<=60;i+=20) shootBullet(true,i); updateHUD(); }
        function move(d) { if(!paused) { let p = document.getElementById("player"); p.style.left = (d==='L' ? Math.max(0,p.offsetLeft-30) : Math.min(260,p.offsetLeft+30))+"px"; updateHUD(); } }
        function buyUpgrade(t) { let c = (t==='dmg'?10:15); if(coins>=c) { coins-=c; if(t==='dmg') upgradeDanoPartida++; else playerHP+=5; updateHUD(); } }
        function buyItem(t) { if(t==='shield' && coins>=20) { coins-=20; shieldHP=5; } if(t==='pet' && coins>=150) petOwned=true; updateHUD(); }
        function togglePause() { paused = !paused; }

        function die() { paused=true; sombrios+=wave*2; melhorias+=totalMelhoriasPartida; trofeusMap[currentSkinId]+=2; localStorage.setItem("gs_melhorias", melhorias); localStorage.setItem("gs_sombrios", sombrios); localStorage.setItem("gs_trofeus", JSON.stringify(trofeusMap)); document.getElementById("gain-stats").innerHTML = `+${totalMelhoriasPartida} Ⓜ️ Melhorias<br>+${wave*2} 🌑 Sombrios`; document.getElementById("game-over").classList.remove("hidden"); }

        function enemyFire(ang=0) {
            const zb = document.createElement("div"); zb.style.cssText="position:absolute;width:10px;height:10px;background:orange;border-radius:50%;top:40px;";
            if(wave%10===0) zb.classList.add("z-bullet-track");
            zb.style.left = (zGroup.offsetLeft + 25) + "px"; area.appendChild(zb);
            let pos = 40, angle = ang;
            if(zb.classList.contains("z-bullet-track")) angle = (document.getElementById("player").offsetLeft + 20 - (zGroup.offsetLeft+25))/45;
            let m = setInterval(() => {
                if(paused) return; pos+=7; zb.style.top = pos+"px"; zb.style.left = (parseFloat(zb.style.left)+angle)+"px";
                let pL = document.getElementById("player").offsetLeft;
                if(pos >= 310 && pos <= 340 && parseFloat(zb.style.left) >= pL && parseFloat(zb.style.left) <= pL+40) {
                    clearInterval(m); zb.remove(); if(shieldHP>0) shieldHP--; else playerHP--; if(playerHP<=0) die(); updateHUD();
                } else if(pos > 360) { clearInterval(m); zb.remove(); }
            }, 40);
        }

        function startLoops() {
            setInterval(() => { if(!paused) { if(wave%10===0){ enemyFire(0); enemyFire(-2); enemyFire(2); } else enemyFire(); }}, 2000);
            setInterval(() => { if(!paused && petOwned) shootBullet(true); }, 5000);
        }
    </script>
</body>
</html>
