<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="theme-color" content="#ff0000">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guerreiro das Sombras Pro - Ⓜ️ Edition</title>
    <style>
        body { background: #000; color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
        .menu-btn { width: 220px; padding: 15px; margin: 10px; background: #111; border: 2px solid #f00; color: #fff; font-size: 18px; font-weight: bold; border-radius: 10px; }
        
        #game-area { width: 300px; height: 350px; background: #111; margin: 10px auto; position: relative; overflow: hidden; border: 2px solid #333; border-radius: 8px; }
        #player { width: 40px; height: 40px; position: absolute; bottom: 10px; left: 130px; z-index: 5; }
        #player img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; filter: drop-shadow(0 0 5px red); }

        .sombrio-icon { display: inline-block; width: 16px; height: 16px; background: #444; border: 2px solid #777; border-radius: 50%; vertical-align: middle; position: relative; box-shadow: inset 0 0 5px #000; }
        .sombrio-icon::after { content: 'S'; font-size: 10px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #bbb; font-weight: bold; }

        .trofeu-icon { display: inline-block; width: 18px; height: 18px; background: #555; border: 2px solid #888; border-radius: 50%; vertical-align: middle; position: relative; box-shadow: 0 0 5px #000; }
        .trofeu-icon::after { content: '🏆'; font-size: 10px; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); filter: grayscale(1); }

        /* Estilo das Missões e Melhorias */
        #missions-menu, #skins-menu, #store { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #f00; padding: 15px; z-index: 2600; width: 300px; border-radius: 10px; max-height: 85vh; overflow-y: auto; }
        .upgrade-section { background: #000; border: 1px solid #444; padding: 10px; margin-top: 15px; border-radius: 8px; text-align: left; }
        .upgrade-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; margin: 5px 0; overflow: hidden; }
        .upgrade-fill { height: 100%; background: #f00; transition: 0.5s; }

        .mission-card { background: #222; padding: 10px; margin: 8px 0; border-radius: 5px; border-left: 4px solid orange; text-align: left; }
        .skin-card { border: 1px solid #444; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; align-items: center; justify-content: space-between; }
        .skin-card img { width: 35px; height: 35px; }

        #zombie-group { position: absolute; width: 60px; height: 80px; top: 10px; left: 120px; display: flex; flex-direction: column; align-items: center; z-index: 4; }
        #zombie { width: 30px; height: 30px; background: green; border-radius: 4px; position: relative; }
        #enemyHPContainer { width: 70px; height: 14px; background: #333; border: 1px solid #fff; margin-top: 5px; border-radius: 3px; overflow: hidden; position: relative; }
        #enemyHPFill { height: 100%; background: #0f0; width: 100%; }

        .bullet { background: yellow; width: 6px; height: 12px; position: absolute; z-index: 3; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 310px; margin: 0 auto; font-size: 13px; font-weight: bold; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 300px; margin: 10px auto; }
        button { padding: 15px 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <h1 style="color:red">GUERREIRO DAS SOMBRAS</h1>
        <div style="margin-bottom:10px; display: flex; justify-content: center; gap: 20px;">
            <div>🌑 <span id="menu-sombrios">0</span></div>
            <div>Ⓜ️ <span id="menu-pontos-m">0</span></div>
        </div>
        <button class="menu-btn" onclick="startGame()">JOGAR</button>
        <div style="display:flex; justify-content:center; width:250px;">
             <button class="menu-btn" style="width:110px; font-size:12px; border-color:orange" onclick="openSkins()">SOMBRAS</button>
             <button class="menu-btn" style="width:110px; font-size:12px; border-color:cyan" onclick="openMissions()">📜 MISSÕES</button>
        </div>
    </div>

    <div id="skins-menu">
        <h3 style="color:cyan; margin-top:0;">MINHAS SOMBRAS</h3>
        <div id="skins-list"></div>

        <div class="upgrade-section">
            <h4 style="color:red; margin:0;">MELHORIA SOMBRIA Ⓜ️</h4>
            <div style="font-size:11px; margin:5px 0;">Nível: <span id="ui-nv">0</span>/10</div>
            <div class="upgrade-bar"><div id="ui-bar" class="upgrade-fill" style="width:0%"></div></div>
            <div style="font-size:10px; color:#aaa; margin-bottom:10px;">Bônus: +<span id="ui-dmg">0</span> Dano | +<span id="ui-hp">0</span> Vida</div>
            <button id="btn-m" style="width:100%; background:#400; color:white; border:1px solid red; padding:8px;" onclick="comprarMelhoriaSombria()">
                MELHORAR (10 🌑 + 20 Ⓜ️)
            </button>
        </div>
        <button class="menu-btn" style="width:100%; background:red; margin-top:10px;" onclick="document.getElementById('skins-menu').style.display='none'">FECHAR</button>
    </div>

    <div id="game-over" class="overlay hidden">
        <h1 style="color:red">GAME OVER</h1>
        <div id="gain-stats" style="margin: 10px; color: #0f0;"></div>
        <button class="menu-btn" onclick="location.reload()">LOBBY</button>
    </div>

    <div id="game-area">
        <div id="player"><img id="player-img" src=""></div>
        <div id="zombie-group">
            <div id="zombie"></div>
            <div id="enemyHPContainer"><div id="enemyHPFill"></div></div>
        </div>
    </div>

    <div class="status-grid">
        <div>💰: <span id="coins-display">0</span></div>
        <div>🌊 Onda: <span id="wave">1</span></div>
        <div>⚔️: <span id="damage-display">1</span></div>
        <div>❤️: <span id="vida">10</span></div>
    </div>

    <div class="controls">
        <button onclick="move('L')">⬅️</button>
        <button onclick="document.getElementById('store').style.display='block'">🛒 LOJA</button>
        <button onclick="move('R')">➡️</button>
        <button style="grid-column: 1/3; background: #f44;" onclick="shootBullet()">🔥 ATACAR</button>
        <button onclick="activateSuper()">✨ SUPER</button>
    </div>

    <div id="store">
        <h3 style="color:orange">LOJA (PARTIDA)</h3>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('dmg')">DANO +1 (10💰)</button>
        <button style="width:100%;margin:5px 0" onclick="buyUpgrade('hp')">VIDA +5 (15💰)</button>
        <button style="width:100%;background:red;margin-top:10px" onclick="document.getElementById('store').style.display='none'">FECHAR</button>
    </div>

    <div id="missions-menu">
        <h3 style="color:cyan">MISSÕES</h3>
        <div id="mission-list">A cada 2 ondas você ganha 1 Ponto Ⓜ️!</div>
        <button class="menu-btn" style="width:100%; background:red" onclick="document.getElementById('missions-menu').style.display='none'">FECHAR</button>
    </div>

    <script>
        const SKINS = [
            { id: "zark", name: "Zark", url: "https://i.ibb.co/WWhT8VPG/bico.jpg" },
            { id: "dexyz", name: "Dexyz", url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRnvh8TAdmT-ayeFiZZ8VoQYWtXSSE4rw4SnIzju8HP2SWsD-gIiVqsFe2D&s=10" }
        ];

        // Salvamento
        let sombrios = parseInt(localStorage.getItem("gs_sombrios")) || 0;
        let pontosM = parseInt(localStorage.getItem("gs_pontos_m")) || 0;
        let nivelM = parseInt(localStorage.getItem("gs_nivel_m")) || 0; // 0 a 10
        let trofeusMap = JSON.parse(localStorage.getItem("gs_trofeus")) || {zark:0, dexyz:0};
        let currentSkinId = localStorage.getItem("gs_current_id") || "zark";
        let ownedSkins = JSON.parse(localStorage.getItem("gs_owned_ids")) || ["zark"];

        let coins=0, upgradeDano=0, wave=1, playerHP=10, paused=true, zombieHP=5, zombieMaxHP=5, superCharge=0, canShoot=true;

        const pImg=document.getElementById("player-img"), zGroup=document.getElementById("zombie-group"), area=document.getElementById("game-area");

        function updateMenuInfo() {
            document.getElementById("menu-sombrios").textContent = sombrios;
            document.getElementById("menu-pontos-m").textContent = pontosM;
            pImg.src = SKINS.find(s => s.id === currentSkinId).url;
        }
        updateMenuInfo();

        function openSkins() {
            const list = document.getElementById("skins-list"); list.innerHTML = "";
            SKINS.forEach(s => {
                const isOwned = ownedSkins.includes(s.id);
                list.innerHTML += `<div class="skin-card"><img src="${s.url}"><b>${s.name}</b><button onclick="${isOwned ? `selectSkin('${s.id}')` : `buySkin('${s.id}')`}">${isOwned ? 'USAR' : '50 🌑'}</button></div>`;
            });
            atualizarInterfaceMelhorias();
            document.getElementById('skins-menu').style.display='block';
        }

        function atualizarInterfaceMelhorias() {
            document.getElementById("ui-nv").textContent = nivelM;
            document.getElementById("ui-bar").style.width = (nivelM * 10) + "%";
            document.getElementById("ui-dmg").textContent = nivelM;
            document.getElementById("ui-hp").textContent = nivelM * 5;
            const btn = document.getElementById("btn-m");
            if(nivelM >= 10) { btn.innerText = "NÍVEL MÁXIMO"; btn.disabled = true; }
        }

        function comprarMelhoriaSombria() {
            if (nivelM < 10 && sombrios >= 10 && pontosM >= 20) {
                sombrios -= 10; pontosM -= 20; nivelM++;
                localStorage.setItem("gs_sombrios", sombrios);
                localStorage.setItem("gs_pontos_m", pontosM);
                localStorage.setItem("gs_nivel_m", nivelM);
                atualizarInterfaceMelhorias(); updateMenuInfo();
            } else { alert("Recursos insuficientes (10 🌑 + 20 Ⓜ️)"); }
        }

        function selectSkin(id) { currentSkinId = id; localStorage.setItem("gs_current_id", id); updateMenuInfo(); document.getElementById('skins-menu').style.display='none'; }

        function startGame() {
            paused=false; document.getElementById("main-menu").classList.add("hidden");
            upgradeDano = nivelM; playerHP = 10 + (nivelM * 5);
            resetEnemy(); startLoops();
        }

        function updateHUD() {
            document.getElementById("vida").textContent = playerHP;
            document.getElementById("coins-display").textContent = coins;
            document.getElementById("wave").textContent = wave;
            document.getElementById("damage-display").textContent = 1 + upgradeDano;
            document.getElementById("enemyHPFill").style.width = (zombieHP/zombieMaxHP)*100 + "%";
        }

        function resetEnemy() {
            if (wave > 1 && wave % 2 === 0) {
                pontosM++; localStorage.setItem("gs_pontos_m", pontosM);
                updateMenuInfo();
            }
            zombieMaxHP = 5 + (wave * 3); zombieHP = zombieMaxHP;
            zGroup.style.left = Math.random()*240+"px"; updateHUD();
        }

        function shootBullet() {
            if(paused || !canShoot) return;
            canShoot = false; setTimeout(() => canShoot = true, 500);
            const b = document.createElement("div"); b.className = "bullet";
            b.style.left = (document.getElementById("player").offsetLeft + 17) + "px";
            b.style.top = "300px"; area.appendChild(b);
            let m = setInterval(() => {
                if(paused) return;
                let top = parseInt(b.style.top);
                if(top <= 60 && top >= 10 && parseInt(b.style.left) >= zGroup.offsetLeft && parseInt(b.style.left) <= zGroup.offsetLeft + 60) {
                    clearInterval(m); b.remove(); zombieHP -= (1 + upgradeDano);
                    if(zombieHP <= 0) { wave++; coins+=5; sombrios+=2; resetEnemy(); } updateHUD();
                } else if(top < -20) { clearInterval(m); b.remove(); }
                else { b.style.top = (top - 10) + "px"; }
            }, 30);
        }

        function move(d) { 
            let cur = document.getElementById("player").offsetLeft;
            document.getElementById("player").style.left = (d==='L' ? Math.max(0,cur-40) : Math.min(260,cur+40))+"px"; 
        }

        function die() {
            paused=true;
            document.getElementById("gain-stats").innerText = `Fim da linha! Onda alcançada: ${wave}`;
            document.getElementById("game-over").classList.remove("hidden");
            localStorage.setItem("gs_sombrios", sombrios);
        }

        function enemyFire() {
            if(paused) return;
            const zb = document.createElement("div"); zb.style.cssText="position:absolute;width:8px;height:8px;background:red;top:40px;";
            zb.style.left = (zGroup.offsetLeft + 25) + "px"; area.appendChild(zb);
            let pos = 40;
            let m = setInterval(() => {
                if(paused) return; pos += 6; zb.style.top = pos + "px";
                let pL = document.getElementById("player").offsetLeft;
                if(pos >= 310 && pos <= 340 && parseInt(zb.style.left) >= pL && parseInt(zb.style.left) <= pL+40) {
                    clearInterval(m); zb.remove(); playerHP--; if(playerHP<=0) die(); updateHUD();
                } else if(pos > 360) { clearInterval(m); zb.remove(); }
            }, 50);
        }

        function buyUpgrade(t) {
            let cost = (t==='dmg'?10:15);
            if(coins>=cost) { coins-=cost; if(t==='dmg') upgradeDano++; else playerHP+=5; updateHUD(); }
        }

        function activateSuper() { alert("SUPER CARREGANDO..."); }

        function startLoops() {
            setInterval(() => { if(!paused) enemyFire(); }, 2000);
        }
    </script>
</body>
</html>
